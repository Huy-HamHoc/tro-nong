<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tro_nong">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>tro_nong</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase JS SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // ── Web Speech API helpers ──────────────────────────────────
    var _recognition = null;

    window.startListening = function(onResult, onError) {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { onError('NOT_SUPPORTED'); return; }

      if (_recognition) { try { _recognition.stop(); } catch(e) {} }

      _recognition = new SR();
      _recognition.lang = 'vi-VN';
      _recognition.continuous = false;
      _recognition.interimResults = false;
      _recognition.maxAlternatives = 1;

      _recognition.onresult = function(event) {
        var transcript = event.results[0][0].transcript;
        onResult(transcript);
      };
      _recognition.onerror = function(event) {
        onError(event.error);
      };
      _recognition.onend = function() {
        _recognition = null;
      };
      _recognition.start();
    };

    window.stopListening = function() {
      if (_recognition) { try { _recognition.stop(); } catch(e) {} _recognition = null; }
    };

    window.speakText = function(text, onDone) {
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'vi-VN';
      u.rate = 0.95;
      u.pitch = 1.0;
      u.onend = function() { if (onDone) onDone(); };
      window.speechSynthesis.speak(u);
    };

    window.cancelSpeech = function() {
      window.speechSynthesis.cancel();
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
